steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'backend/Dockerfile'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/stadium360/cs360-backend/server:v1'
      - '.'

images:
  - 'asia-northeast1-docker.pkg.dev/stadium360/cs360-backend/server:v1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
