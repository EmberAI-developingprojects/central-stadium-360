services:
  - type: web
    name: cs360-backend
    runtime: node
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeploy: true
    buildCommand: |
      npm install -g pnpm@9.12.3
      pnpm install --frozen-lockfile
      pnpm --filter @cs360/shared build
    startCommand: cd backend && pnpm exec tsx src/dev.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PNPM_VERSION
        value: 9.12.3
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: SMS_HOOK_SECRET
        sync: false
      - key: SMS_PROVIDER
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_MEDIAPACKAGE_CHANNEL_ID
        sync: false
      - key: AWS_IVS_CAM1_URL
        sync: false
      - key: AWS_IVS_CAM2_URL
        sync: false
      - key: AWS_IVS_CAM3_URL
        sync: false
      - key: AWS_IVS_CAM4_URL
        sync: false
      - key: AWS_IVS_CAM1_ARN
        sync: false
      - key: AWS_IVS_CAM2_ARN
        sync: false
      - key: AWS_IVS_CAM3_ARN
        sync: false
      - key: AWS_IVS_CAM4_ARN
        sync: false
      - key: IVS_PLAYBACK_KEY_ARN
        sync: false
      - key: IVS_PRIVATE_KEY_BASE64
        sync: false
      - key: QPAY_USERNAME
        sync: false
      - key: QPAY_PASSWORD
        sync: false
      - key: QPAY_INVOICE_CODE
        sync: false
      - key: QPAY_BASE_URL
        value: https://merchant.qpay.mn
      - key: QPAY_CALLBACK_SECRET
        sync: false
      - key: PUBLIC_BACKEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SIGNED_URL_SECRET
        sync: false

  - type: web
    name: cs360-frontend
    runtime: static
    autoDeploy: true
    buildCommand: |
      npm install -g pnpm@9.12.3
      pnpm install --frozen-lockfile
      pnpm --filter @cs360/shared build
      pnpm --filter @cs360/frontend build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: PNPM_VERSION
        value: 9.12.3
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
