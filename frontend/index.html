<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, h1, h2, h3, h4, h5, h6, p, span, a, li, ul, ol, blockquote, em, strong,
      button, input, select, textarea, optgroup, label, legend, fieldset {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      /* TinyMCE-generated HTML news body */
      .news-body h1 { font-size: 26px; font-weight: 700; color: #111827; margin: 24px 0 12px; line-height: 1.3; }
      .news-body h2 { font-size: 22px; font-weight: 700; color: #111827; margin: 22px 0 10px; line-height: 1.35; }
      .news-body h3 { font-size: 18px; font-weight: 600; color: #111827; margin: 18px 0 8px; line-height: 1.4; }
      .news-body p  { margin: 0 0 14px; }
      .news-body ul, .news-body ol { padding-left: 22px; margin: 0 0 14px; }
      .news-body li { margin-bottom: 5px; }
      .news-body a  { color: #2230C6; text-decoration: underline; text-underline-offset: 3px; }
      .news-body img { max-width: 100%; height: auto; border-radius: 12px; display: block; margin: 16px 0; }
      .news-body blockquote { border-left: 3px solid #2230C6; margin: 0 0 14px; padding: 8px 16px; color: #4b5563; background: #f8f9ff; border-radius: 0 8px 8px 0; }
      .news-body table { width: 100%; border-collapse: collapse; margin: 0 0 16px; font-size: 14px; }
      .news-body table th, .news-body table td { border: 1px solid #e5e7eb; padding: 8px 12px; text-align: left; }
      .news-body table th { background: #f9fafb; font-weight: 600; }
      .news-body strong { font-weight: 700; }
      .news-body em { font-style: italic; }
      .news-body pre, .news-body code { font-family: 'Menlo', 'Monaco', monospace; background: #f3f4f6; border-radius: 6px; padding: 2px 6px; font-size: 13px; }
      .news-body pre { padding: 14px; overflow-x: auto; margin-bottom: 14px; }
    </style>
  </head>
  <body class="m-0 p-0 text-[#1a1a1a] bg-white [-webkit-font-smoothing:antialiased] [-moz-osx-font-smoothing:grayscale]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
