<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Бүртгүүлэх — Төв Цэнгэлдэх Хүрээлэн</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">

  <header class="login-header">
    <a class="login-logo" href="index.html" aria-label="Төв Цэнгэлдэх Хүрээлэн — Нүүр">
      <img src="assets/images/brand/logo.png" alt="Төв Цэнгэлдэх Хүрээлэн" />
    </a>
    <a class="login-back" href="login.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Нэвтрэх рүү буцах
    </a>
  </header>

  <main class="login-main">
    <section class="login-card">
      <span class="login-eyebrow">
        <span class="login-eyebrow-dot" aria-hidden="true"></span>
        Хувийн булан
      </span>

      <h1 class="login-title">Шинээр бүртгүүлэх</h1>
      <p class="login-subtitle">
        Утасны дугаар эсвэл Gmail хаягаараа бүртгүүлж, тасалбар, шууд дамжуулал,
        гишүүнчлэлдээ хандах боломжтой.
      </p>

      <div class="reg-tabs" role="tablist" aria-label="Бүртгэлийн төрөл">
        <button type="button" class="reg-tab is-active" role="tab" aria-selected="true" data-method="phone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/>
          </svg>
          Утасны дугаар
        </button>
        <button type="button" class="reg-tab" role="tab" aria-selected="false" data-method="email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Gmail
        </button>
      </div>

      <form class="login-form reg-form" id="regForm" novalidate>
        <label class="login-field">
          <span class="login-label">Бүтэн нэр</span>
          <input class="login-input" type="text" name="fullname" placeholder="Жишээ: Б. Болор" autocomplete="name" required />
        </label>

        <label class="login-field reg-field-phone">
          <span class="login-label">Утасны дугаар</span>
          <span class="reg-phone-wrap">
            <span class="reg-phone-prefix" aria-hidden="true">+976</span>
            <input class="login-input reg-input-phone" type="tel" name="phone" placeholder="8800 0000" inputmode="numeric" maxlength="9" autocomplete="tel-national" />
          </span>
          <span class="reg-hint">8 оронтой Монгол утасны дугаар оруулна уу</span>
        </label>

        <label class="login-field reg-field-email" hidden>
          <span class="login-label">Gmail хаяг</span>
          <input class="login-input reg-input-email" type="email" name="email" placeholder="name@gmail.com" autocomplete="email" />
          <span class="reg-hint">Зөвхөн @gmail.com хаяг хүлээн авна</span>
        </label>

        <label class="login-field">
          <span class="login-label">Нууц үг</span>
          <span class="login-password-wrap">
            <input class="login-input" type="password" name="password" placeholder="••••••••" autocomplete="new-password" minlength="8" required />
            <button type="button" class="login-pass-toggle" aria-label="Нууц үг харах">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </span>
          <span class="reg-hint">Хамгийн багадаа 8 тэмдэгт</span>
        </label>

        <label class="login-field">
          <span class="login-label">Нууц үг давтах</span>
          <input class="login-input" type="password" name="password_confirm" placeholder="••••••••" autocomplete="new-password" minlength="8" required />
        </label>

        <label class="reg-terms">
          <input type="checkbox" name="agree" required />
          <span>Үйлчилгээний нөхцөл болон нууцлалын бодлогыг хүлээн зөвшөөрч байна.</span>
        </label>

        <div class="reg-alert" role="alert" hidden></div>

        <button type="submit" class="login-submit">
          Бүртгүүлэх
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <div class="login-divider"><span>эсвэл</span></div>

      <a class="login-register" href="login.html">Аль хэдийн бүртгэлтэй — Нэвтрэх</a>

      <a class="login-home" href="index.html">Нүүр хуудас руу буцах</a>
    </section>
  </main>

  <script>
    (function () {
      var form = document.getElementById('regForm');
      if (!form) return;

      // Password show/hide
      var toggle = form.querySelector('.login-pass-toggle');
      if (toggle) {
        var pwInput = toggle.parentElement.querySelector('input');
        toggle.addEventListener('click', function () {
          var isPwd = pwInput.type === 'password';
          pwInput.type = isPwd ? 'text' : 'password';
          toggle.setAttribute('aria-label', isPwd ? 'Нууц үг нуух' : 'Нууц үг харах');
        });
      }

      // Tabs: phone vs email
      var tabs = form.parentElement.querySelectorAll('.reg-tab');
      var phoneField = form.querySelector('.reg-field-phone');
      var emailField = form.querySelector('.reg-field-email');
      var phoneInput = form.querySelector('.reg-input-phone');
      var emailInput = form.querySelector('.reg-input-email');
      var method = 'phone';

      function setMethod(next) {
        method = next;
        tabs.forEach(function (t) {
          var on = t.dataset.method === next;
          t.classList.toggle('is-active', on);
          t.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        if (next === 'phone') {
          phoneField.hidden = false;
          emailField.hidden = true;
          phoneInput.required = true;
          emailInput.required = false;
        } else {
          phoneField.hidden = true;
          emailField.hidden = false;
          phoneInput.required = false;
          emailInput.required = true;
        }
        clearAlert();
      }
      tabs.forEach(function (t) {
        t.addEventListener('click', function () { setMethod(t.dataset.method); });
      });

      // Mongolian phone formatting: 8 digits, common prefixes 7, 8, 9
      phoneInput.addEventListener('input', function () {
        var digits = phoneInput.value.replace(/\D/g, '').slice(0, 8);
        phoneInput.value = digits.length > 4 ? digits.slice(0, 4) + ' ' + digits.slice(4) : digits;
      });

      // Alerts
      var alertEl = form.querySelector('.reg-alert');
      function showAlert(msg) {
        alertEl.textContent = msg;
        alertEl.hidden = false;
      }
      function clearAlert() {
        alertEl.textContent = '';
        alertEl.hidden = true;
      }

      // Validate + submit
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearAlert();

        var fullname = form.fullname.value.trim();
        var password = form.password.value;
        var confirm = form.password_confirm.value;
        var agree = form.agree.checked;

        if (fullname.length < 2) return showAlert('Бүтэн нэрээ оруулна уу.');

        if (method === 'phone') {
          var digits = phoneInput.value.replace(/\D/g, '');
          if (digits.length !== 8) return showAlert('Утасны дугаар 8 оронтой байх ёстой.');
          if (!/^[6789]/.test(digits)) return showAlert('Зөвхөн Монгол утасны дугаар хүлээн авна (6, 7, 8, 9-өөр эхэлсэн).');
        } else {
          var email = emailInput.value.trim().toLowerCase();
          if (!/^[a-z0-9._%+-]+@gmail\.com$/.test(email)) {
            return showAlert('Зөвхөн @gmail.com хаяг хүлээн авна.');
          }
        }

        if (password.length < 8) return showAlert('Нууц үг хамгийн багадаа 8 тэмдэгт байх ёстой.');
        if (password !== confirm) return showAlert('Нууц үг таарахгүй байна.');
        if (!agree) return showAlert('Үйлчилгээний нөхцөлийг зөвшөөрнө үү.');

        // Persist a lightweight account record so login can verify it locally
        var record = {
          fullname: fullname,
          method: method,
          identifier: method === 'phone' ? '+976' + phoneInput.value.replace(/\D/g, '') : emailInput.value.trim().toLowerCase(),
          password: password,
          createdAt: new Date().toISOString()
        };
        try {
          var users = JSON.parse(localStorage.getItem('tsengeldekh_users') || '[]');
          if (users.some(function (u) { return u.identifier === record.identifier; })) {
            return showAlert('Энэ ' + (method === 'phone' ? 'утасны дугаар' : 'и-мэйл') + ' аль хэдийн бүртгэлтэй байна.');
          }
          users.push(record);
          localStorage.setItem('tsengeldekh_users', JSON.stringify(users));
        } catch (err) {
          /* localStorage unavailable — ignore */
        }

        // Success feedback
        form.querySelector('.login-submit').textContent = 'Бүртгэгдлээ ✓';
        form.querySelector('.login-submit').disabled = true;
        setTimeout(function () { window.location.href = 'login.html'; }, 900);
      });
    })();
  </script>
</body>
</html>
