<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Нэвтрэх — Төв Цэнгэлдэх Хүрээлэн</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">

  <header class="login-header">
    <a class="login-logo" href="index.html" aria-label="Төв Цэнгэлдэх Хүрээлэн — Нүүр">
      <img src="assets/images/brand/logo.png" alt="Төв Цэнгэлдэх Хүрээлэн" />
    </a>
    <a class="login-back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Нүүр буцах
    </a>
  </header>

  <main class="login-main">
    <section class="login-card">
      <span class="login-eyebrow">
        <span class="login-eyebrow-dot" aria-hidden="true"></span>
        Хувийн булан
      </span>

      <h1 class="login-title">Нэвтрэх</h1>
      <p class="login-subtitle">
        Тасалбар, шууд дамжуулал, гишүүнчлэлдээ хандахын тулд бүртгэлээрээ нэвтэрнэ үү.
      </p>

      <form class="login-form" id="loginForm" novalidate>
        <label class="login-field">
          <span class="login-label">И-мэйл эсвэл утасны дугаар</span>
          <input class="login-input" type="text" name="identifier" placeholder="name@gmail.com эсвэл 8800 0000" autocomplete="username" required />
        </label>

        <label class="login-field">
          <span class="login-label">Нууц үг</span>
          <span class="login-password-wrap">
            <input class="login-input" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="login-pass-toggle" aria-label="Нууц үг харах">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </span>
        </label>

        <div class="reg-alert" role="alert" hidden></div>

        <button type="submit" class="login-submit">
          Нэвтрэх
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <div class="login-divider"><span>эсвэл</span></div>

      <a class="login-register" href="register.html">Шинээр бүртгүүлэх</a>

      <a class="login-home" href="index.html">Нүүр хуудас руу буцах</a>
    </section>
  </main>

  <script>
    (function () {
      var form = document.getElementById('loginForm');
      if (!form) return;

      var toggle = form.querySelector('.login-pass-toggle');
      if (toggle) {
        var pwInput = toggle.parentElement.querySelector('input');
        toggle.addEventListener('click', function () {
          var isPwd = pwInput.type === 'password';
          pwInput.type = isPwd ? 'text' : 'password';
          toggle.setAttribute('aria-label', isPwd ? 'Нууц үг нуух' : 'Нууц үг харах');
        });
      }

      var alertEl = form.querySelector('.reg-alert');
      function showAlert(msg) { alertEl.textContent = msg; alertEl.hidden = false; }
      function clearAlert() { alertEl.textContent = ''; alertEl.hidden = true; }

      // Normalize: gmail trimmed + lowercased; phone reduced to +976 + 8 digits
      function normalize(raw) {
        var v = raw.trim();
        if (/@/.test(v)) return v.toLowerCase();
        var digits = v.replace(/\D/g, '');
        if (digits.length === 11 && digits.indexOf('976') === 0) digits = digits.slice(3);
        if (digits.length === 8) return '+976' + digits;
        return v;
      }

      // Hard-coded test account so the flow can be tried without registering.
      var TEST_USER = { identifier: 'admin', password: 'admin', fullname: 'Admin' };

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearAlert();

        var rawId = form.identifier.value.trim();
        var pw = form.password.value;
        if (!rawId) return showAlert('И-мэйл эсвэл утасны дугаараа оруулна уу.');
        if (!pw) return showAlert('Нууц үгээ оруулна уу.');

        var account = null;

        // Test bypass: admin / admin
        if (rawId.toLowerCase() === TEST_USER.identifier && pw === TEST_USER.password) {
          account = TEST_USER;
        } else {
          var id = normalize(rawId);
          var users = [];
          try { users = JSON.parse(localStorage.getItem('tsengeldekh_users') || '[]'); } catch (e2) {}
          account = users.find(function (u) { return u.identifier === id; });
          if (!account) return showAlert('Бүртгэл олдсонгүй. Шинээр бүртгүүлнэ үү.');
          if (account.password !== pw) return showAlert('Нууц үг буруу байна.');
        }

        try {
          localStorage.setItem('tsengeldekh_session', JSON.stringify({
            identifier: account.identifier,
            fullname: account.fullname,
            loggedInAt: new Date().toISOString()
          }));
        } catch (e3) {}

        var btn = form.querySelector('.login-submit');
        btn.textContent = 'Тавтай морилно уу, ' + (account.fullname || '') + ' ✓';
        btn.disabled = true;
        var params = new URLSearchParams(window.location.search);
        var next = params.get('next');
        var safeNext = /^[a-zA-Z0-9_.-]+\.html$/.test(next || '') ? next : 'index.html';
        setTimeout(function () { window.location.href = safeNext; }, 900);
      });
    })();
  </script>
</body>
</html>
